<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>領収証アップロード</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: #f0f0f0;
  padding: 16px;
  font-size: 18px;
}
h1 { font-size: 1.3em; text-align: center; padding: 0.8em 0; color: #333; }
.card { background: #fff; border-radius: 16px; padding: 1.2em; margin-bottom: 1em; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
label { display: block; font-size: 0.9em; color: #555; margin-bottom: 0.5em; font-weight: bold; }
.req { color: #d33; margin-left: 0.3em; }
.badge { font-size: 0.7em; background: #e8f0fb; color: #3a7bd5; padding: 0.15em 0.6em; border-radius: 1em; margin-left: 0.4em; font-weight: normal; }
input[type="text"],
input[type="date"],
textarea {
  width: 100%; padding: 0.8em; border: 2px solid #ddd; border-radius: 10px;
  font-size: 1em; margin-bottom: 1em; background: #fafafa; color: #333;
  -webkit-appearance: none; appearance: none; font-family: inherit;
}
textarea { height: 5em; resize: none; line-height: 1.5; }
input:focus, textarea:focus { outline: none; border-color: #3a7bd5; background: #fff; }
.upload-wrap {
  position: relative;
  border: 3px dashed #bbb;
  border-radius: 16px;
  margin-bottom: 1em;
  min-height: 9em;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: #999;
  overflow: hidden;
  cursor: pointer;
}
.upload-wrap.has-file { border-color: #3a7bd5; }
.upload-inner { padding: 2em 1em; pointer-events: none; }
.upload-icon { font-size: 3em; margin-bottom: 0.3em; }
.upload-text { font-size: 1em; line-height: 1.7; }
.upload-wrap img { max-width: 100%; max-height: 14em; border-radius: 10px; margin: 0.5em; pointer-events: none; }
#file-input {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  opacity: 0;
  cursor: pointer;
  font-size: 16px;
}
button {
  width: 100%; padding: 1em; border: none; border-radius: 12px;
  font-size: 1.2em; font-weight: bold; cursor: pointer; margin-bottom: 0.7em;
  font-family: inherit; -webkit-tap-highlight-color: transparent;
}
button:active:not(:disabled) { opacity: 0.7; }
#btn-ocr { background: #3a7bd5; color: #fff; }
#btn-ocr:disabled { background: #b0c4e8; }
#btn-submit { background: #27ae60; color: #fff; }
#btn-submit:disabled { background: #9fd4b5; }
#msg { text-align: center; font-size: 0.95em; min-height: 1.8em; padding: 0.4em 0; line-height: 1.5; }
.ok { color: #27ae60; }
.err { color: #d33; }
.loading { color: #888; }
@media (min-width: 600px) {
  body { max-width: 560px; margin: 0 auto; padding: 24px; }
}
</style>
</head>
<body>

<h1>📄 領収証アップロード</h1>

<div class="card">
  <label>領収証・レシート画像<span class="req">必須</span></label>
  <div class="upload-wrap" id="drop-area">
    <div class="upload-inner" id="drop-inner">
      <div class="upload-icon">📷</div>
      <div class="upload-text" id="upload-text">タップして画像を選択<br><small>HEIC・JPG・PNG対応</small></div>
    </div>
    <img id="preview" style="display:none">
    <input type="file" id="file-input" accept="image/*">
  </div>
  <button id="btn-ocr" disabled>🔍 OCRで読み取る</button>
</div>

<div class="card">
  <label>日付<span class="badge">OCR自動入力</span></label>
  <input type="date" id="f-date">

  <label>金額（円）<span class="badge">OCR自動入力</span></label>
  <input type="text" id="f-amount" placeholder="例：1500" inputmode="numeric">

  <label>支払い人</label>
  <input type="text" id="f-payer" placeholder="例：田中">

  <label>購入品詳細<span class="badge">OCR自動入力</span></label>
  <textarea id="f-items" placeholder="例：大根、豚肉、コーン"></textarea>

  <label>備考</label>
  <textarea id="f-memo" placeholder="任意"></textarea>

  <button id="btn-submit" disabled>✅ 送信する</button>
  <div id="msg"></div>
</div>

<script>
var GAS_URL = 'https://ancient-cake-5c1a.npo-osaka-npo.workers.dev/';

var selectedFile = null;
var imageBase64  = null;
var imageMime    = null;

var dropArea  = document.getElementById('drop-area');
var fileInput = document.getElementById('file-input');
var preview   = document.getElementById('preview');
var dropInner = document.getElementById('drop-inner');
var btnOcr    = document.getElementById('btn-ocr');
var btnSubmit = document.getElementById('btn-submit');
var msgEl     = document.getElementById('msg');

fileInput.addEventListener('change', function(e) {
  if (e.target.files && e.target.files[0]) {
    handleFile(e.target.files[0]);
  }
});

function handleFile(file) {
  if (!file) return;
  selectedFile = file;
  imageMime = file.type || 'image/jpeg';
  var reader = new FileReader();
  reader.onload = function(e) {
    imageBase64 = e.target.result.split(',')[1];
    preview.src = e.target.result;
    preview.style.display = 'block';
    dropInner.style.display = 'none';
    dropArea.classList.add('has-file');
    btnOcr.disabled = false;
    setMsg('', '');
    checkSubmit();
  };
  reader.readAsDataURL(file);
}

btnOcr.addEventListener('click', function() {
  if (!imageBase64) return;
  btnOcr.disabled = true;
  setMsg('読み取り中...', 'loading');

  fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'ocr', base64: imageBase64, mimeType: imageMime })
  })
  .then(function(r) { return r.json(); })
  .then(function(res) {
    btnOcr.disabled = false;
    if (!res.success) { setMsg('OCRエラー: ' + res.error, 'err'); return; }
    var o = res.ocr;
    if (o.date)   document.getElementById('f-date').value   = o.date.replace(/\//g, '-');
    if (o.amount) document.getElementById('f-amount').value = o.amount;
    if (o.items)  document.getElementById('f-items').value  = o.items;
    setMsg('✔ 読み取り完了。内容を確認して送信してください。', 'ok');
    checkSubmit();
  })
  .catch(function(err) {
    btnOcr.disabled = false;
    setMsg('エラー: ' + err.message, 'err');
  });
});

function checkSubmit() {
  btnSubmit.disabled = !selectedFile;
}

btnSubmit.addEventListener('click', function() {
  if (!selectedFile) { setMsg('画像を選択してください', 'err'); return; }
  btnSubmit.disabled = true;
  setMsg('送信中（少々お待ちください）...', 'loading');

  fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({
      action:      'submit',
      date:        document.getElementById('f-date').value,
      amount:      document.getElementById('f-amount').value,
      payer:       document.getElementById('f-payer').value,
      items:       document.getElementById('f-items').value,
      memo:        document.getElementById('f-memo').value,
      imageBase64: imageBase64,
      imageMime:   imageMime,
      filename:    selectedFile.name
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(res) {
    if (res.success) {
      setMsg('✅ 送信完了！', 'ok');
      resetForm();
    } else {
      setMsg('送信エラー: ' + res.error, 'err');
      btnSubmit.disabled = false;
    }
  })
  .catch(function(err) {
    setMsg('エラー: ' + err.message, 'err');
    btnSubmit.disabled = false;
  });
});

function resetForm() {
  selectedFile = null; imageBase64 = null; imageMime = null;
  fileInput.value = '';
  preview.style.display = 'none';
  dropInner.style.display = 'block';
  dropArea.classList.remove('has-file');
  ['f-date','f-amount','f-payer','f-items','f-memo'].forEach(function(id) {
    document.getElementById(id).value = '';
  });
  btnOcr.disabled = true;
  btnSubmit.disabled = true;
  setMsg('', '');
}

function setMsg(text, cls) {
  msgEl.textContent = text;
  msgEl.className = cls;
}
</script>
</body>
</html>
